<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ale & Gael ❤️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            /* Degradado basado en tu imagen */
            background: linear-gradient(180deg, #fce4ec 0%, #ff80ab 45%, #f06292 100%);
            background-attachment: fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh; /* Altura total de la ventana */

            /* ESTO CENTRA TODO EL CONTENIDO */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        .romantic-font { font-family: 'Dancing Script', cursive; color: #ff4d6d; }
        .form-control:focus { border-color: #ff4d6d; box-shadow: 0 0 0 0.25rem rgba(255, 77, 109, 0.25); }
        .btn-love { background-color: #ff4d6d; color: white; border: none; font-weight: 600; }
        .btn-love:hover { background-color: #ff3355; color: white; }
    </style>
</head>
<body>

<div class="login-card">
    <h1 class="romantic-font mb-4">Hola mi niña de ojitos hermosos</h1>
    <p class="mb-4 small text-muted">Ingresa la fecha de nuestro aniversario para entrar</p>

    <input type="password" id="fechaInput" class="form-control mb-3 text-center" placeholder="Ej. 051107" maxlength="6">
    <button onclick="validar()" class="btn btn-love w-100 py-2 shadow-sm">Entrar</button>

    <p id="error" class="text-danger mt-3 small" style="display: none;">Esa no es la fecha... intenta de nuevo 🌹</p>
</div>

<script>
    function validar() {
        const input = document.getElementById('fechaInput').value;
        // Tu clave: 081122
        if (input === "081122") {
            window.location.href = "index.html";
        } else {
            document.getElementById('error').style.display = "block";
            document.getElementById('fechaInput').value = "";
        }
    }

    document.getElementById('fechaInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') validar();
    });
</script>
</body>
</html>
