<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal | Ale & Gael❤️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --amor-rojo: #d63031;
            --amor-rosa: #fdf5f5;
            --amor-texto: #4a4a4a;
        }

        body {
            /* Degradado lineal basado en tu imagen: Blanco rosado arriba -> Rosa intenso abajo */
            background: linear-gradient(180deg, #fce4ec 0%, #ff80ab 45%, #f06292 100%);

            /* Esto asegura que el fondo cubra toda la pantalla y no se repita */
            background-attachment: fixed;
            background-size: cover;

            font-family: 'Montserrat', sans-serif;
            color: var(--amor-texto);
            margin: 0;
            min-height: 100vh;
        }

        /* NAVEGACIÓN INTEGRADA EN EL HERO */
        .nav-integrada {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 0;
            z-index: 1000;
        }

        .nav-integrada .nav-link {
            color: #ffffff !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin: 0 20px;
            transition: all 0.3s ease;
            opacity: 0.9;
        }

        .nav-integrada .nav-link:hover {
            opacity: 1;
            transform: translateY(-2px);
            text-shadow: 0px 0px 8px rgba(255,255,255,0.5);
        }

        /* SECCIÓN HERO (CABECERA) */
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0,0,0,0.6)), url('assets/img/fond3.jfif') no-repeat center center;
            background-size: cover;
            height: 70vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            margin-bottom: 30px;
        }

        .romantic-font {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
        }

        /* SECCIONES INFERIORES */
        .story-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 5px 25px rgba(214, 48, 49, 0.1);
            border-bottom: 5px solid var(--amor-rojo);
        }

        .counter-number {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--amor-rojo);
            display: block;
        }

        .memory-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .memory-card:hover { transform: translateY(-10px); }

        .memory-img { height: 250px; object-fit: cover; }

        .heart-divider { color: var(--amor-rojo); font-size: 1.5rem; margin: 20px 0; }

        footer {
            background-color: rgba(255, 255, 255, 0.5);
            border-top: 1px solid rgba(214, 48, 49, 0.1);
        }
    </style>
</head>
<body>

<header class="hero-section" id="inicio">
    <nav class="nav-integrada">
        <div class="container d-flex justify-content-center">
            <a class="nav-link" href="#inicio">INICIO</a>
            <a class="nav-link" href="#tiempo-juntos">TIEMPO JUNTOS</a>
            <a class="nav-link" href="nuestra-historia.html">NUESTRA HISTORIA</a>
            <a class="nav-link" href="recuerdos.html">RECUERDOS</a>
        </div>
    </nav>

    <div>
        <h1 class="romantic-font">Ale y Gael</h1>
        <p class="lead text-uppercase fw-bold" style="letter-spacing: 2px; max-width: 800px; margin: auto;">Nuestra página web</p>
    </div>
</header>

<div class="container my-5" id="tiempo-juntos" style="scroll-margin-top: 50px;">
    <div class="row justify-content-center">
        <div class="col-lg-8 story-section text-center">
            <h2 class="romantic-font" style="color: var(--amor-rojo);">Tiempo juntos</h2>
            <div class="heart-divider">❤</div>
            <p class="mb-1 text-uppercase fw-bold">Hemos estado juntos</p>
            <span id="contador-dias" class="counter-number">0</span>
            <p class="lead fw-bold mb-4">DÍAS</p>
            <p><b>Desde aquel 8 de noviembre del 2022, no dejo de amarte cada día más</b></p>
        </div>
    </div>
</div>

<div class="container mb-5" id="recuerdos">
    <div class="row g-4 justify-content-center">
        <div class="col-md-5">
            <div class="card memory-card">
                <img src="assets/img/ag1.jfif" class="card-img-top memory-img">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">Nuestra historia</h5>
                    <a href="nuestra-historia.html" class="btn btn-outline-danger btn-sm mt-2">Ver historia</a>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card memory-card">
                <img src="assets/img/ag2.jfif" class="card-img-top memory-img">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">Nuestros recuerdos</h5>
                    <a href="recuerdos.html" class="btn btn-outline-danger btn-sm mt-2">Ver fotos</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-5 text-center">
    <p class="mb-1">ALE & GAEL</p>
    <p class="fw-bold text-uppercase" style="font-size: 0.8rem; color: var(--amor-rojo);">Te amo con locura Alesita mía</p>
</footer>

<script>
    function actualizarContador() {
        const fechaInicio = new Date(2022, 10, 8);
        const fechaActual = new Date();
        const diferenciaMilisegundos = fechaActual - fechaInicio;
        const diasJuntos = Math.floor(diferenciaMilisegundos / (1000 * 60 * 60 * 24));
        document.getElementById('contador-dias').innerText = diasJuntos;
    }
    actualizarContador();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
